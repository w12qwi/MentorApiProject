services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: mentor
      POSTGRES_PASSWORD: mentor
      POSTGRES_DB: calculations_project
      POSTGRES_SSL: disable
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mentor
      POSTGRES_PASSWORD: mentor
      POSTGRES_DB: calculations_project
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentor -d calculations_project"]
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  postgres_data: